{% extends "base.html" %}
{% block title %}Регистрация · ANIMEFLOW{% endblock %}

{% block content %}
  <div class="min-h-[60vh] grid place-items-center">
    <div class="w-full max-w-md rounded-2xl bg-surface border border-white/5 p-8 shadow-2xl">
      <div class="text-center mb-6">
        <div class="w-12 h-12 rounded-2xl bg-accent shadow-glow grid place-items-center mx-auto mb-3 text-white font-black">A</div>
        <h1 class="text-2xl font-extrabold">Создать аккаунт</h1>
        <p class="text-sm text-gray-400 mt-1">Сохраняйте любимое и продолжайте просмотр с любого устройства</p>
      </div>

      {% if error %}
        <div class="mb-4 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-300 text-sm">{{ error }}</div>
      {% endif %}

      <form method="post" action="/register" class="space-y-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Имя пользователя</label>
          <input name="username" required minlength="3" class="w-full bg-surface2 border border-white/5 focus:border-accent focus:ring-2 focus:ring-accent/30 rounded-xl px-4 py-3 text-sm outline-none transition" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Email</label>
          <input name="email" type="email" required class="w-full bg-surface2 border border-white/5 focus:border-accent focus:ring-2 focus:ring-accent/30 rounded-xl px-4 py-3 text-sm outline-none transition" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1.5">Пароль</label>
          <input name="password" type="password" required minlength="6" class="w-full bg-surface2 border border-white/5 focus:border-accent focus:ring-2 focus:ring-accent/30 rounded-xl px-4 py-3 text-sm outline-none transition" />
        </div>
        <button class="w-full py-3 rounded-xl bg-accent hover:bg-accentSoft transition font-semibold shadow-glow">Зарегистрироваться</button>
      </form>

      <p class="text-center text-sm text-gray-400 mt-6">
        Уже есть аккаунт? <a href="/login" class="text-accent hover:underline">Войти</a>
      </p>
    </div>
  </div>
{% endblock %}
